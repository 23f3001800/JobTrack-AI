# ============================================================
# JobTrack AI — Docker Compose (Full Stack)
# ============================================================
# Runs both the FastAPI backend and Next.js dashboard.
#
# Usage:
#   docker compose up --build          # Build and run
#   docker compose up -d               # Detached mode
#   docker compose logs -f api         # Follow API logs
#
# WHY two services instead of one?
# Docker best practice: one process per container.
# This lets you scale, restart, and monitor each independently.
# ============================================================

services:
  # ── FastAPI Backend ──
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WORKSPACE_DIR=/app/workspace
    volumes:
      # Persist workspace files (PDFs, cover letters) across restarts
      - workspace_data:/app/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js Dashboard ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/dashboard
    command: ["npx", "next", "start", "-p", "3000"]
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  workspace_data: