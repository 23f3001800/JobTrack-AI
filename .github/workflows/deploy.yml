name: CI/CD — JobTrack AI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # WHY install Playwright here too?
      # tests/test_graph.py imports from agent/graph.py which
      # imports tools/scraper.py which imports playwright.
      # Without installing chromium, the import itself fails.
      # We install chromium but tests mock the browser calls —
      # no actual browser launches in unit tests.
      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_KEY: ci-test-key
          LANGCHAIN_TRACING_V2: "false"
        run: pytest tests/ -v --tb=short

      # Eval gate: only on push to main (runs real agent = costs money)
      - name: Eval gate
        if: github.event_name == 'push'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
        run: python tests/run_evals.py


      - name: Build Docker image
        run: docker build -t jobtrack-ai:${{ github.sha }} .

      - name: Verify Railway token is set
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ RAILWAY_TOKEN secret is missing"
            exit 1
          else
            echo "✅ RAILWAY_TOKEN is present (length: ${#RAILWAY_TOKEN})"
          fi

      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service poetic-enthusiasm --detach